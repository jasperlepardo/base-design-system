name: Release

# Fires when a version bump lands on main (the merge of a `release/*` PR).
# Guarded by a tag-existence check, so unrelated package.json edits are no-ops.
on:
  push:
    branches: [main]
    paths: ['package.json']
  workflow_dispatch:

permissions:
  contents: write # create tag + GitHub Release
  packages: write # publish to GitHub Packages

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
      - id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - id: check
        run: |
          if git rev-parse "v${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "v${{ steps.ver.outputs.version }} already tagged — nothing to release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.check.outputs.exists == 'false'
        run: npm ci
      - if: steps.check.outputs.exists == 'false'
        run: npm run build
      - if: steps.check.outputs.exists == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="v${{ steps.ver.outputs.version }}"
          git tag "$V"
          git push origin "$V"
          gh release create "$V" --title "$V" --generate-notes
